<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>코테 트레이너</title>
<meta name="theme-color" content="#1a1d23">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body class="view-problem">
<header>
  <button id="btn-menu" class="icon-btn" aria-label="문제 목록 열기">☰</button>
  <h1>🏋️ 코테 트레이너</h1>
  <span class="sub" id="engine-status">Python 엔진 대기</span>
  <button id="btn-records" class="ghost-btn">기록</button>
</header>

<main>
  <aside id="problem-list">
    <div id="mode-toggle" role="tablist">
      <button id="mode-local" class="active" role="tab">내 문제</button>
      <button id="mode-boj" role="tab">백준 실전</button>
    </div>
    <div id="filters">
      <select id="f-diff" aria-label="난이도 필터">
        <option value="">난이도 전체</option>
        <option>쉬움</option>
        <option>중간</option>
        <option>어려움</option>
      </select>
      <select id="f-type" aria-label="유형 필터">
        <option value="">유형 전체</option>
        <option value="algo">알고리즘</option>
        <option value="sql">SQL</option>
      </select>
      <label><input type="checkbox" id="f-unsolved"> 안 푼 문제만</label>
    </div>
    <ul id="plist"></ul>
    <div id="boj-panel" class="hidden">
      <div id="boj-filters">
        <div class="row-2">
          <select id="boj-t1" aria-label="최소 티어">
            <option value="b5">브론즈 5</option><option value="b3">브론즈 3</option>
            <option value="b1">브론즈 1</option><option value="s5" selected>실버 5</option>
            <option value="s3">실버 3</option><option value="s1">실버 1</option>
            <option value="g5">골드 5</option><option value="g3">골드 3</option>
          </select>
          <select id="boj-t2" aria-label="최대 티어">
            <option value="b1">브론즈 1</option><option value="s3" selected>실버 3</option>
            <option value="s1">실버 1</option><option value="g5">골드 5</option>
            <option value="g3">골드 3</option><option value="g1">골드 1</option>
            <option value="p5">플래 5</option>
          </select>
        </div>
        <select id="boj-tag" aria-label="태그">
          <option value="">태그 전체</option>
          <option value="implementation">구현</option>
          <option value="sorting">정렬</option>
          <option value="hashing">해시</option>
          <option value="bruteforcing">완전탐색</option>
          <option value="greedy">그리디</option>
          <option value="bfs">BFS</option>
          <option value="dfs">DFS</option>
          <option value="binary_search">이분탐색</option>
          <option value="dp">DP</option>
          <option value="graphs">그래프</option>
          <option value="data_structures">자료구조</option>
          <option value="string">문자열</option>
          <option value="two_pointer">투포인터</option>
          <option value="simulation">시뮬레이션</option>
        </select>
        <label><input type="checkbox" id="boj-unsolved"> 안 푼 문제만</label>
        <button id="boj-search">문제 찾기</button>
      </div>
      <p id="boj-status" class="hint"></p>
      <ul id="boj-list"></ul>
    </div>
  </aside>
  <div id="list-backdrop"></div>

  <section id="workspace" class="hidden">
    <div id="statement-pane">
      <div id="prob-meta"></div>
      <div id="statement"></div>
    </div>
    <div id="editor-pane">
      <div id="editor-toolbar">
        <button id="btn-run" title="Shift+Enter"><span aria-hidden="true">▶</span> 실행</button>
        <button id="btn-submit" title="Cmd/Ctrl+Enter"><span aria-hidden="true">✓</span> 제출</button>
        <span id="status" aria-live="polite"></span>
      </div>
      <textarea id="code"></textarea>
      <div id="symbar" aria-label="빠른 입력">
        <button data-ins="    ">⇥</button><button data-ins=":">:</button>
        <button data-ins="(">(</button><button data-ins=")">)</button>
        <button data-ins="[">[</button><button data-ins="]">]</button>
        <button data-ins="=">=</button><button data-ins="_">_</button>
        <button data-ins="'">'</button><button data-ins='"'>"</button>
        <button data-ins="<"><</button><button data-ins=">">></button>
        <button data-ins=",">,</button><button data-ins="*">*</button>
      </div>
      <div id="results" aria-live="polite"></div>
    </div>
  </section>

  <section id="placeholder">
    <p>왼쪽에서 문제를 선택하세요.</p>
  </section>
</main>

<nav id="mtabs" aria-label="화면 전환">
  <button data-view="problem" class="active">문제</button>
  <button data-view="code">코드</button>
  <button data-view="result">결과</button>
</nav>

<div id="records-modal" class="modal hidden" role="dialog" aria-label="기록">
  <div class="modal-box">
    <h3>풀이 기록</h3>
    <p id="rec-stats"></p>
    <div class="modal-sec">
      <b>백업</b>
      <div class="row">
        <button id="btn-export">내보내기 (JSON)</button>
        <label class="file-btn">가져오기<input type="file" id="imp-file" accept=".json" hidden></label>
      </div>
    </div>
    <div class="modal-sec">
      <b>GitHub Gist 동기화 (선택)</b>
      <p class="hint">github.com → Settings → Developer settings → Personal access tokens에서
        <code>gist</code> 권한만 준 토큰을 만들어 붙여넣으면 폰↔PC 기록이 합쳐집니다.</p>
      <input type="password" id="gist-token" placeholder="GitHub 토큰 (ghp_...)" autocomplete="off">
      <input type="text" id="gist-id" placeholder="Gist ID (비우면 자동 생성)" autocomplete="off">
      <div class="row">
        <button id="btn-sync">지금 동기화</button>
        <span id="sync-status" class="hint"></span>
      </div>
    </div>
    <div class="row right"><button id="btn-close-modal" class="ghost-btn">닫기</button></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
<script src="problems.js"></script>
<script src="app.js"></script>
</body>
</html>
